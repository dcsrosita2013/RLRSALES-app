services:
  db:
    image: postgres:16-alpine
    container_name: rlr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rlr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rlr_password}
      POSTGRES_DB: ${POSTGRES_DB:-rlr_db}
    ports:
      # Host 5433 -> container 5432 (5432 is used by another local stack).
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - rlr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rlr} -d ${POSTGRES_DB:-rlr_db}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  rlr_pgdata:
